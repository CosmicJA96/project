{% extends "layout.html" %}
{% block body %}
<!--Heading-->
<div class="title-bar">
<h1><ins>The Solar System</ins></h1>
</div>
<!--Layout-->
<div class="container">
    {% for planet in planets %}
        <div class="card">
            <a href="{{ url_for('planet', id=planet[0]) }}">
            <img src="{{ planet[3] }}" alt="">
            <p><strong>{{ planet[1] }}</strong></p>
            <p>{{ planet[2] }}km</p>
            </a>
        </div>
    {% endfor %}
</div>
{% endblock %}
